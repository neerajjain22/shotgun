name: Daily Blog Generation

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install content generator dependencies
        run: npm install
        working-directory: heykrish-content

      - name: Generate one article
        run: npm run run-once
        working-directory: heykrish-content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push updates to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add heykrish-content/articles.json content/blog

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Generate daily blog article"
          git push origin main
